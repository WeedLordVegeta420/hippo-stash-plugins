name: Theater Mode
description: Adds a theater mode button to the video player that expands the video to the full page width.
version: "1.1"
url: https://github.com/hippochapel/hippo-stash-plugins/tree/main/plugins/TheaterMode
ui:
  javascript:
    - theater.js
settings:
  default_mode:
    displayName: Default Mode
    description: "Theater mode state on page load: remember (default, restore last state), always_on, always_off"
    type: STRING
